<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body style="background:#000;color:#fff;display:flex;align-items:center;justify-content:center;height:100vh;font-size:2rem;">
<div id="tap" style="text-align:center;padding:40px;">TAP HERE<br><small id="status" style="font-size:1rem;color:#aaa;">waiting...</small></div>
<audio id="bgMusic" loop preload="auto" playsinline>
  <source src="iwannabeyours.mp3" type="audio/mpeg">
</audio>
<script>
const music = document.getElementById('bgMusic');
const status = document.getElementById('status');

document.getElementById('tap').addEventListener('touchstart', () => {
  const p = music.play();
  if (p !== undefined) {
    p.then(() => { status.textContent = '✅ playing!'; status.style.color='#0f0'; })
     .catch(err => { status.textContent = '❌ ' + err.message; status.style.color='#f00'; });
  } else {
    status.textContent = '⚠️ play() returned undefined';
  }
}, { passive: true });
</script>
</body>
</html>
